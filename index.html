<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Cifras Multi-PDF</title>
    <!-- Importa a biblioteca PDF.js para mapear os arquivos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .search-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .search-box {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
        }
        .search-box:focus {
            border-color: #007bff;
        }
        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
            font-weight: bold;
        }
        .layout-artistas {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
        }
        @media(max-width: 900px) {
            .layout-artistas { grid-template-columns: 1fr; }
        }
        .results-list {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-height: 700px;
            overflow-y: auto;
        }
        .result-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
            margin-bottom: 5px;
        }
        .result-item:hover {
            background-color: #e9ecef;
        }
        .result-title {
            font-weight: bold;
            color: #007bff;
            margin: 0 0 5px 0;
        }
        .result-meta {
            font-size: 12px;
            color: #28a745;
            margin: 0;
            font-weight: bold;
        }
        .viewer-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 700px;
        }
        #pdf-frame {
            width: 100%;
            height: 100%;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="search-section">
        <input type="text" id="search-input" class="search-box" placeholder="Aguarde, inicializando indexador de volumes..." disabled>
        <div id="status-message" class="status" style="color: #d97706;">Conectando à biblioteca de cifras...</div>
    </div>

    <div class="layout-artistas">
        <div class="results-list" id="results-container">
            <p style="color: #999; text-align: center;">Os resultados da busca aparecerão aqui.</p>
        </div>

        <div class="viewer-section">
            <h3 id="playing-title" style="margin-top:0; color:#555;">Nenhuma cifra selecionada</h3>
            <iframe id="pdf-frame" src="about:blank"></iframe>
        </div>
    </div>
</div>

<script>
    // Configura o worker da biblioteca externa
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    // Lista com os 10 arquivos individuais pequenos
    const arquivosPDF = [
        'cifras1.pdf', 'cifras2.pdf', 'cifras3.pdf', 'cifras4.pdf', 'cifras5.pdf',
        'cifras6.pdf', 'cifras7.pdf', 'cifras8.pdf', 'cifras9.pdf', 'cifras10.pdf'
    ];

    const statusMsg = document.getElementById('status-message');
    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('results-container');
    const pdfFrame = document.getElementById('pdf-frame');

    // Libera a interface imediatamente, pois a varredura ocorrerá sob demanda
    statusMsg.style.color = "#16a34a";
    statusMsg.innerText = "Pronto! Digite a música e aperte Enter para varrer os 10 arquivos.";
    searchInput.disabled = false;
    searchInput.placeholder = "Digite a música ou artista e aperte Enter...";
    searchInput.focus();

    searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            realizarBuscaGlobal();
        }
    });

    async function realizarBuscaGlobal() {
        const termoBusca = searchInput.value.toLowerCase().trim();
        if (!termoBusca) return;

        statusMsg.style.color = "#0284c7";
        statusMsg.innerText = "Varrendo os 10 volumes em lote... Aguarde.";
        resultsContainer.innerHTML = '<p style="text-align:center; color:#666;">Pesquisando nas coleções...</p>';
        
        let totalResultados = 0;
        const fragmento = document.createDocumentFragment();

        // Percorre cada um dos 10 arquivos cadastrados
        for (const nomeArquivo of arquivosPDF) {
            try {
                // Tenta abrir o documento atual em segundo plano
                const pdf = await pdfjsLib.getDocument(nomeArquivo).promise;
                
                // Varre as páginas do documento atual
                for (let i = 1; i <= pdf.numPages; i++) {
                    const pagina = await pdf.getPage(i);
                    const conteudoTexto = await pagina.getTextContent();
                    const textoPagina = conteudoTexto.items.map(item => item.str).join(' ').toLowerCase();

                    // Se encontrar o termo na página, cria o card de resultado
                    if (textoPagina.includes(termoBusca)) {
                        totalResultados++;

                        // Extrai as primeiras palavras para servir de identificação
                        let previsualizacao = conteudoTexto.items.slice(0, 5).map(item => item.str).join(' ').trim();
                        if(!previsualizacao) previsualizacao = `Música na Pág. ${i}`;

                        const divItem = document.createElement('div');
                        divItem.className = 'result-item';
                        divItem.innerHTML = `
                            <p class="result-title">${previsualizacao}</p>
                            <p class="result-meta">Origem: ${nomeArquivo} (Pág. ${i})</p>
                        `;
                        
                        // Configura o gatilho para carregar o arquivo correto na página exata
                        divItem.onclick = () => exibirCifra(nomeArquivo, i, previsualizacao);
                        fragmento.appendChild(divItem);
                    }
                }
            } catch (erro) {
                // Registra no console caso algum dos 10 arquivos ainda não tenha sido upado
                console.warn(`Arquivo ${nomeArquivo} não localizado ou ainda não enviado.`);
            }
        }

        resultsContainer.innerHTML = '';
        if (totalResultados === 0) {
            resultsContainer.innerHTML = '<p style="color:#cc0000; text-align:center; font-weight:bold;">Nenhum resultado encontrado nos arquivos.</p>';
            statusMsg.style.color = "#dc2626";
            statusMsg.innerText = "Nenhuma correspondência localizada.";
        } else {
            resultsContainer.appendChild(fragmento);
            statusMsg.style.color = "#16a34a";
            statusMsg.innerText = `Busca finalizada! Encontradas ${totalResultados} correspondências para escolha.`;
        }
    }

    // Carrega o PDF e rola dinamicamente até a página que contém a cifra
    function exibirCifra(arquivoPdf, numPagina, titulo) {
        document.getElementById('playing-title').innerText = `${titulo}`;
        statusMsg.style.color = "#d97706";
        statusMsg.innerText = `Renderizando folha do arquivo ${arquivoPdf}, página ${numPagina}...`;
        
        // Direciona o iframe para o arquivo correto aplicando o parâmetro de rolagem nativa
        pdfFrame.src = `${arquivoPdf}#page=${numPagina}`;
    }
</script>

</body>
</html>
