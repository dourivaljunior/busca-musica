<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice Inteligente de Cifras</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .search-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .search-box {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            outline: none;
        }
        .search-box:focus {
            border-color: #28a745;
        }
        .results-list {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .result-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .result-title {
            font-weight: bold;
            color: #333;
            margin: 0;
            font-size: 18px;
        }
        .result-artist {
            margin: 5px 0 0 0;
            color: #666;
            font-size: 14px;
        }
        .page-badge {
            background-color: #28a745;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        .tip {
            font-size: 12px;
            color: #777;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="search-section">
        <h2 style="margin-top: 0; color: #28a745;">🔍 Buscador de Páginas (PDF 16GB)</h2>
        <input type="text" id="search-input" class="search-box" placeholder="Digite o nome da música ou do artista..." oninput="filtrarIndice()">
        <p class="tip">Digite pelo menos 2 letras para filtrar o catálogo de páginas.</p>
    </div>

    <div class="results-list" id="results-container">
        <p style="color: #999; text-align: center; margin: 0;">Resultados aparecerão aqui à medida que você digitar.</p>
    </div>
</div>

<script>
    /*******************************************************************
     * 🔎 CADASTRO DO SEU REPERTÓRIO (ALIMENTAÇÃO MANUAL)             *
     * Como o PDF é uma imagem gigante, você adiciona as músicas aqui. *
     * Adicione quantas quiser seguindo o padrão abaixo:               *
     *******************************************************************/
    const biblioteca = [
        { titulo: "Gita", artista: "Raul Seixas", pagina: 12 },
        { titulo: "Metamorfose Ambulante", artista: "Raul Seixas", pagina: 13 },
        { titulo: "Como Nossos Pais", artista: "Elis Regina", pagina: 45 },
        { titulo: "O Trem Azul", artista: "Elis Regina", pagina: 46 },
        { titulo: "Ainda Ontem Chorei de Saudade", artista: "João Mineiro & Marciano", pagina: 120 },
        // Adicione as próximas linhas aqui
    ];
    /*******************************************************************/

    const resultsContainer = document.getElementById('results-container');

    function filtrarIndice() {
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        resultsContainer.innerHTML = '';

        if (query.length < 2) {
            resultsContainer.innerHTML = '<p style="color: #999; text-align: center; margin: 0;">Digite pelo menos 2 letras para pesquisar.</p>';
            return;
        }

        const filtrados = biblioteca.filter(m => 
            m.titulo.toLowerCase().includes(query) || 
            m.artista.toLowerCase().includes(query)
        );

        if (filtrados.length === 0) {
            resultsContainer.innerHTML = '<p style="color: #cc0000; text-align: center; margin: 0; font-weight: bold;">Nenhum registro encontrado no índice.</p>';
            return;
        }

        const fragmento = document.createDocumentFragment();
        filtrados.forEach(m => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <div>
                    <p class="result-title">${m.titulo}</p>
                    <p class="result-artist">${m.artista}</p>
                </div>
                <div class="page-badge">Pág. ${m.pagina}</div>
            `;
            fragmento.appendChild(div);
        });

        resultsContainer.appendChild(fragmento);
    }
</script>

</body>
</html>
